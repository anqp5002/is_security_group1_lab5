<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName ptit.com
    DocumentRoot /var/www/ptit-task4

    SSLEngine on
    SSLCertificateFile /home/hoanganh/pki-lab/server.crt
    SSLCertificateKeyFile /home/hoanganh/pki-lab/server-nopass.key

    <Directory /var/www/ptit-task4>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/pki_task4_error.log
    CustomLog ${APACHE_LOG_DIR}/pki_task4_access.log combined
</VirtualHost>
</IfModule>
