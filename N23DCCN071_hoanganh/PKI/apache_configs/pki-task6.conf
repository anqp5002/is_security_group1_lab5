<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName hacker.com
    DocumentRoot /var/www/hacker-task6

    SSLEngine on
    SSLCertificateFile /home/hoanganh/compromised-ca-lab/hacker6.crt
    SSLCertificateKeyFile /home/hoanganh/compromised-ca-lab/hacker6.key

    <Directory /var/www/hacker-task6>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/pki_task6_error.log
    CustomLog ${APACHE_LOG_DIR}/pki_task6_access.log combined
</VirtualHost>
</IfModule>
