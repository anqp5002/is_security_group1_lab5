<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName ptit.com
    DocumentRoot /var/www/ptit-task5

    SSLEngine on
    SSLCertificateFile /home/hoanganh/hacker-lab/hacker.crt
    SSLCertificateKeyFile /home/hoanganh/hacker-lab/hacker.key

    <Directory /var/www/ptit-task5>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/pki_task5_error.log
    CustomLog ${APACHE_LOG_DIR}/pki_task5_access.log combined
</VirtualHost>
</IfModule>
